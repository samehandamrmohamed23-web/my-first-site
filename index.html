<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة معادلات الحديد - كيمياء تالته ثانوي</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .eq-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .eq-card.active .eq-content { max-height: 2500px; transition: max-height 0.5s ease-in; }
        .eq-card.active .chevron-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen pb-12">

    <header class="bg-gradient-to-r from-amber-950 via-stone-900 to-amber-950 text-center py-8 px-4 shadow-2xl border-b border-amber-500/20 rounded-b-[2.5rem]">
        <div class="inline-flex bg-amber-500/10 text-amber-400 p-3 rounded-full mb-2 border border-amber-500/20">
            <i class="fas fa-flask text-2xl animate-pulse"></i>
        </div>
        <h1 class="text-2xl md:text-3xl font-extrabold mb-2 text-white">المايسترو في معادلات الحديد 🧪</h1>
        <p class="text-xs md:text-sm text-amber-300 font-medium">منهج الصف الثالث الثانوي - منظمة بالكامل مع شروط التفاعل والألوان</p>
    </header>

    <div class="max-w-6xl mx-auto p-4">
        
        <div class="relative max-w-xl mx-auto mb-6 mt-2">
            <i class="fas fa-search absolute right-4 top-3.5 text-stone-400"></i>
            <input type="text" id="search-input" oninput="searchEquations()" placeholder="ابحث عن معادلة... (مثال: تحميص، هيماتيت، حمض مركز، الكلور)" class="w-full bg-stone-900 border border-stone-800 pr-11 pl-4 py-3 rounded-2xl text-sm focus:outline-none focus:border-amber-500 shadow-inner text-white placeholder-stone-500">
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-start">
            
            <div class="lg:col-span-1 bg-stone-900/60 border border-stone-800 p-3 rounded-2xl flex flex-row lg:flex-col gap-2 overflow-x-auto sticky top-4 z-40 backdrop-blur">
                <button onclick="switchSection('all', this)" class="sec-btn w-full text-right bg-amber-600 text-white font-bold px-4 py-3 rounded-xl text-xs md:text-sm shadow whitespace-nowrap">✨ كل المعادلات</button>
                <button onclick="switchSection(1, this)" class="sec-btn w-full text-right bg-stone-900 text-stone-400 hover:bg-stone-800 font-semibold px-4 py-3 rounded-xl text-xs md:text-sm whitespace-nowrap">🔥 تجهيز وتحميص الخامات</button>
                <button onclick="switchSection(2, this)" class="sec-btn w-full text-right bg-stone-900 text-stone-400 hover:bg-stone-800 font-semibold px-4 py-3 rounded-xl text-xs md:text-sm whitespace-nowrap">🔩 تفاعلات الحديد النقي (Fe)</button>
                <button onclick="switchSection(3, this)" class="sec-btn w-full text-right bg-stone-900 text-stone-400 hover:bg-stone-800 font-semibold px-4 py-3 rounded-xl text-xs md:text-sm whitespace-nowrap">🟢 أكسيد الحديد II (FeO)</button>
                <button onclick="switchSection(4, this)" class="sec-btn w-full text-right bg-stone-900 text-stone-400 hover:bg-stone-800 font-semibold px-4 py-3 rounded-xl text-xs md:text-sm whitespace-nowrap">⚫ أكسيد الحديد المغناطيسي (Fe3O4)</button>
                <button onclick="switchSection(5, this)" class="sec-btn w-full text-right bg-stone-900 text-stone-400 hover:bg-stone-800 font-semibold px-4 py-3 rounded-xl text-xs md:text-sm whitespace-nowrap">🔴 أكسيد الحديد III (Fe2O3)</button>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div class="flex justify-between items-center mb-2">
                    <h2 id="section-title" class="text-xl font-bold text-amber-400 border-r-4 border-amber-500 pr-3">كل معادلات الحديد</h2>
                    <span class="text-xs text-stone-500 font-sans">اضغط على العنوان لإظهار شروط التفاعل والملاحظات</span>
                </div>
                <div id="equations-container" class="space-y-4">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const chemistryDatabase = [
            {
                sec: 1,
                title: "تحميص السدريت (كربونات الحديد II)",
                equation: "2FeCO3 --(Δ)--> 2FeO + 2CO2  ||  4FeO + O2 --(Δ)--> 2Fe2O3",
                condition: "التسخين بشدة في الهواء (أكسدة)",
                colors: "السدريت: رمادي مصفر | أكسيد الحديد II: أسود | الهيماتيت (Fe2O3): أحمر داكن.",
                notes: "الهدف النهائي من التحميص هو تحويل جميع الخامات إلى هيماتيت (أكسيد حديد III) لسهولة اختزاله وزيادة نسبة الحديد في الخام."
            },
            {
                sec: 1,
                title: "تحميص الليمونيت (أكسيد الحديد III المتهدرت)",
                equation: "2Fe2O3.3H2O --(Δ)--> 2Fe2O3 + 3H2O",
                condition: "تسخين شديد لطرد الرطوبة",
                colors: "الليمونيت: أصفر | الهيماتيت الناتج: أحمر داكن.",
                notes: "هذا التفاعل هو تفاعل فيزيائي كيميائي الهدف منه طرد بخار الماء وزيادة نسبة الحديد من 40% إلى 69.6%."
            },
            {
                sec: 2,
                title: "تفاعل الحديد مع الهواء (الأكسجين)",
                equation: "3Fe (s) + 2O2 (g) --(🔥 500°C)--> Fe3O4 (s)",
                condition: "تسخين الحديد لدرجة الاحمرار (500 درجة مئوية)",
                colors: "الحديد: رمادي | أكسيد الحديد المغناطيسي الناتج: أسود.",
                notes: "ينتج أكسيد مختلط (مغناطيسي) وليس أكسيد حديد III لأن الأكسدة لا تكون تامة عند هذه الظروف."
            },
            {
                sec: 2,
                title: "تفاعل الحديد مع بخار الماء المتصاعد",
                equation: "3Fe (s) + 4H2O (g) --(🔥 500°C)--> Fe3O4 (s) + 4H2 (g)↑",
                condition: "تسخين شديد لدرجة الاحمرار 500°C",
                colors: "يتصاعد غاز الهيدروجين الذي يشتعل بفرقعة.",
                notes: "تنبيه: يتصاعد غاز الهيدروجين كعامل مختزل، وهو السبب في فرملة الأكسدة عند الأكسيد المغناطيسي."
            },
            {
                sec: 2,
                title: "تفاعل الحديد مع اللافلزات (الكلور)",
                equation: "2Fe (s) + 3Cl2 (g) --(Δ)--> 2FeCl3 (s)",
                condition: "تسخين مباشرة مع غاز الكلور",
                colors: "كلوريد الحديد III الناتج: محلوله بني مخضر / صلب بني محمر.",
                notes: "لماذا يتكون كلوريد حديد III وليس II؟ لأن غاز الكلور عامل مؤكسد قوي يؤكسد أي كلوريد حديد II يتكون مباشرة إلى حديد III."
            },
            {
                sec: 2,
                title: "تفاعل الحديد مع الأحماض المخففة (مثال: HCl)",
                equation: "Fe (s) + 2HCl (dil) ----> FeCl2 (aq) + H2 (g)↑",
                condition: "حمض هيدروكلوريك مخفف (dil)",
                colors: "كلوريد الحديد II: محلول أخضر فاتح.",
                notes: "ينتج هنا كبريتات أو كلوريد حديد II وليس III؛ لأن غاز الهيدروجين المتصاعد عامل مختزل قوي يختزل أي حديد III يتكون فوراً."
            },
            {
                sec: 2,
                title: "تفاعل الحديد مع حمض الكبريتيك المركز الثقيل",
                equation: "3Fe + 8H2SO4 (conc) --(Δ)--> FeSO4 + Fe2(SO4)3 + 4H2O + 4SO2 (g)↑",
                condition: "حمض كبريتيك مركز ساخن",
                colors: "غاز SO2 المتصاعد: ذو رائحة نفاذة ويخضر ورقة مبللة بثاني كرومات البوتاسيوم.",
                notes: "هذه المعادلة هي أهم معادلة للتمييز بين الحديد وأكاسيده، لأن الحديد النقي هو الوحيد الذي يطلق غاز ثاني أكسيد الكبريت SO2 مع المركز."
            },
            {
                sec: 3,
                title: "تحضير أكسيد الحديد II (تسخين أكسالات الحديد II)",
                equation: "(COO)2Fe --(Δ / بمعزل عن الهواء)--> FeO + CO↑ + CO2↑",
                condition: "تسخين شديد بمعزل عن الهواء (No Air)",
                colors: "الأكسالات: بلورات صلبة | FeO الناتج: مسحوق أسود.",
                notes: "لو سُخنت الأكسالات في الهواء لـتأكسد FeO فوراً وتحول إلى Fe2O3 (أحمر). غاز CO المتصاعد يمنع أكسدة الحديد."
            },
            {
                sec: 3,
                title: "تفاعل أكسيد الحديد II مع الأحماض المخففة",
                equation: "FeO (s) + H2SO4 (dil) ----> FeSO4 (aq) + H2O (l)",
                condition: "تفاعل مباشر مع الأحماض المخففة فقط",
                colors: "كبريتات الحديد II الناتجة: محلول أخضر فاتح.",
                notes: "يتميز FeO بأنه يتفاعل مع الأحماض المخففة، بينما الأكاسيد الأعلى (المغناطيسي والثلاثي) لا تتفاعل أبداً مع المخفف."
            },
            {
                sec: 4,
                title: "تفاعل أكسيد الحديد المغناطيسي مع الأحماض المركزة",
                equation: "Fe3O4 + 4H2SO4 (conc) --(Δ)--> FeSO4 + Fe2(SO4)3 + 4H2O",
                condition: "حمض مركز ساخن فقط",
                colors: "ينتج خليط من أملاح حديد II وأملاح حديد III.",
                notes: "هذا التفاعل يثبت برهان أن أكسيد الحديد المغناطيسي هو (أكسيد مختلط أو مركب) يتكون من اتحاد أكسيدين هما FeO و Fe2O3."
            },
            {
                sec: 5,
                title: "تحضير الهيماتيت من هيدروكسيد الحديد III",
                equation: "2Fe(OH)3 --(🔥 > 200°C)--> Fe2O3 + 3H2O",
                condition: "تسخين لدرجة حرارة أعلى من 200 درجة مئوية",
                colors: "هيدروكسيد الحديد III: راسب بني محمر جيلاتيني | الهيماتيت: أحمر داكن.",
                notes: "طريقة مشهورة في التحويلات: (حديد -> كلوريد حديد III -> هيدروكسيد حديد III -> هيماتيت)."
            },
            {
                sec: 5,
                title: "الاختزال السحري للهيماتيت (التحكم في الأكاسيد بالحرارة)",
                equation: "1) 2Fe2O3 + CO --(230-300°C)--> 2Fe3O4 + CO2<br>2) Fe2O3 + CO --(400-700°C)--> 2FeO + CO2<br>3) Fe2O3 + 3CO --(> 700°C)--> 2Fe + 3CO2",
                condition: "تتغير النواتج تماماً حسب درجة حرارة الاختزال!",
                colors: "الغاز المختزل هو أول أكسيد الكربون CO أو الهيدروجين H2.",
                notes: "تذكر دائماً في الامتحان: من 230 لـ 300 يعطيك مغناطيسي | من 400 لـ 700 يعطيك أكسيد II | أعلى من 700 (في الفرن العالي) يعطيك حديد نقي!"
            }
        ];

        let currentSection = 'all';

        function renderEquations(data) {
            const container = document.getElementById('equations-container');
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 text-stone-500">
                        <i class="fas fa-eraser text-3xl mb-3 block"></i>
                        لم نجد أي معادلة تطابق بحثك.
                    </div>
                `;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "eq-card bg-stone-900 border border-stone-800 rounded-2xl shadow-md overflow-hidden";
                card.innerHTML = `
                    <div onclick="toggleCard(this)" class="p-4 hover:bg-stone-800/50 flex justify-between items-center cursor-pointer transition select-none">
                        <div class="flex items-center gap-3">
                            <span class="bg-amber-950 text-amber-400 text-[10px] font-bold px-2 py-0.5 rounded-md border border-amber-500/10">قسم ${item.sec}</span>
                            <h3 class="font-bold text-sm md:text-base text-stone-200">${item.title}</h3>
                        </div>
                        <i class="fas fa-chevron-down text-stone-500 text-xs chevron-icon transition-transform duration-300"></i>
                    </div>
                    <div class="eq-content bg-stone-950/50">
                        <div class="p-4 md:p-5 space-y-4 border-t border-stone-800/60 text-xs md:text-sm">
                            <div>
                                <span class="text-emerald-400 font-bold block mb-1 text-[11px]"><i class="fas fa-vial ml-1"></i> can المعادلة الكيميائية الموزونة:</span>
                                <div class="bg-stone-950 font-mono text-center text-emerald-400 font-bold p-3 rounded-xl border border-stone-900 shadow-inner select-all text-sm md:text-base my-1 relative" style="direction: ltr;">
                                    ${item.equation}
                                </div>
                            </div>
                            <div class="bg-amber-950/20 border border-amber-500/10 p-3 rounded-xl">
                                <span class="text-amber-400 font-bold block mb-1 text-[11px]"><i class="fas fa-fire ml-1"></i> شروط التفاعل والسهم:</span>
                                <p class="text-stone-300 font-medium">${item.condition}</p>
                            </div>
                            <div class="bg-blue-950/20 border border-blue-500/10 p-3 rounded-xl">
                                <span class="text-blue-400 font-bold block mb-1 text-[11px]"><i class="fas fa-palette ml-1"></i> الألوان وحالات المواد الملاحظة بالعين:</span>
                                <p class="text-stone-300">${item.colors}</p>
                            </div>
                            <div class="bg-stone-900 border border-stone-800 p-3 rounded-xl">
                                <span class="text-stone-400 font-bold block mb-1 text-[11px]"><i class="fas fa-exclamation-triangle ml-1"></i> تريكة الامتحان وفهم السؤال النظري:</span>
                                <p class="text-stone-400 leading-relaxed">${item.notes}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleCard(element) {
            const card = element.parentElement;
            const isActive = card.classList.contains('active');
            document.querySelectorAll('.eq-card').forEach(c => c.classList.remove('active'));
            if (!isActive) {
                card.classList.add('active');
            }
        }

        function switchSection(section, buttonElement) {
            currentSection = section;
            document.getElementById('search-input').value = '';
            
            const titles = {
                'all': "كل معادلات الحديد",
                1: "قسم معادلات تجهيز، تحميص، واختزال الخامات",
                2: "قسم تفاعلات عنصر الحديد النقي (Fe)",
                3: "قسم تحضير وتفاعلات أكسيد الحديد II",
                4: "قسم تفاعلات أكسيد الحديد المغناطيسي (المختلط)",
                5: "قسم تحضير وتفاعلات أكسيد الحديد III (الهيماتيت)"
            };
            document.getElementById('section-title').innerText = titles[section];

            document.querySelectorAll('.sec-btn').forEach(btn => {
                btn.classList.remove('bg-amber-600', 'text-white', 'shadow');
                btn.classList.add('bg-stone-900', 'text-stone-400', 'hover:bg-stone-800');
            });
            buttonElement.classList.remove('bg-stone-900', 'text-stone-400', 'hover:bg-stone-800');
            buttonElement.classList.add('bg-amber-600', 'text-white', 'shadow');

            filterAndRender();
        }

        function searchEquations() {
            filterAndRender();
        }

        function filterAndRender() {
            const searchWord = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = chemistryDatabase.filter(item => {
                const matchesSection = (currentSection === 'all' || item.sec === currentSection);
                const matchesSearch = item.title.toLowerCase().includes(searchWord) || 
                                      item.equation.toLowerCase().includes(searchWord) || 
                                      item.notes.toLowerCase().includes(searchWord) || 
                                      item.condition.toLowerCase().includes(searchWord);
                return matchesSection && matchesSearch;
            });
            renderEquations(filtered);
        }

        // تشغيل البناء الأولي عند فتح الصفحة
        filterAndRender();
    </script>
</body>
</html>
